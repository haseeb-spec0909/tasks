steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/backend:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/backend:$SHORT_SHA'
      - '-f'
      - 'infrastructure/docker/backend.Dockerfile'
      - 'backend/'
    id: 'build-backend'

  # Build scheduler image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/scheduler:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/scheduler:$SHORT_SHA'
      - '-f'
      - 'infrastructure/docker/scheduling-engine.Dockerfile'
      - 'scheduling-engine/'
    id: 'build-scheduler'

  # Build chatbot image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/chatbot:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/chatbot:$SHORT_SHA'
      - '-f'
      - 'infrastructure/docker/chatbot.Dockerfile'
      - 'backend/'
    id: 'build-chatbot'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/backend:latest'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/scheduler:latest'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/timeintel/chatbot:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
